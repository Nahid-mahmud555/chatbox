<html lang="en">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #7C3AED;
            --primary-light: #A78BFA;
            --secondary: #F472B6;
            --accent: #22D3EE;
            --accent2: #34D399;
            --bg-dark: #0A0A0F;
            --bg2-dark: #111118;
            --bg3-dark: #16161f;
            --text-dark: #F1F0FF;
            --text2-dark: #A09BBF;
            --border-dark: rgba(255,255,255,0.07);
            
            --bg-light: #F8F9FF;
            --bg2-light: #FFFFFF;
            --bg3-light: #F0F2FA;
            --text-light: #1A1A2E;
            --text2-light: #4A4A6A;
            --border-light: rgba(0,0,0,0.08);
            
            --bg: var(--bg-dark);
            --bg2: var(--bg2-dark);
            --bg3: var(--bg3-dark);
            --text: var(--text-dark);
            --text2: var(--text2-dark);
            --border: var(--border-dark);
            --success: #34D399;
            --error: #F87171;
            --radius: 14px;
            --radius2: 22px;
            --vh: 1vh;
        }

        [data-theme="light"] {
            --bg: var(--bg-light);
            --bg2: var(--bg2-light);
            --bg3: var(--bg3-light);
            --text: var(--text-light);
            --text2: var(--text2-light);
            --border: var(--border-light);
        }

        html, body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
            transition: background 0.3s ease;
        }

        /* Toast */
        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--bg3);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 99999;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            color: var(--text);
            max-width: 90%;
            text-align: center;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
        #toast.success { border-color: var(--success); color: var(--success); }
        #toast.error { border-color: var(--error); color: var(--error); }

        /* Auth Page */
        .page {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: var(--bg);
            transition: opacity 0.3s ease;
            overflow-y: auto;
            width: 100%;
            height: 100%;
        }
        .page.hidden { opacity: 0; pointer-events: none; }

        .auth-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 24px;
        }
        .auth-logo i { font-size: 2rem; color: var(--primary); }
        .auth-logo span { font-size: 1.5rem; font-weight: 900; }
        .auth-logo em { color: var(--primary); font-style: normal; }

        .auth-tabs {
            display: flex;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 4px;
            margin-bottom: 24px;
        }
        .auth-tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--text2);
            font-weight: 700;
            font-size: 0.9rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 44px;
        }
        .auth-tab.active {
            background: var(--primary);
            color: white;
        }

        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text2);
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            color: var(--text);
            font-family: inherit;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.2s;
            min-height: 48px;
        }
        .auth-btn:active { transform: scale(0.98); }

        /* Profile Page */
        .profile-page {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 90;
            width: 100%;
            height: 100%;
        }
        .profile-page.hidden { transform: translateX(100%); }

        .profile-header {
            padding: 16px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .profile-header .back-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .profile-header h3 { font-size: 1.1rem; }

        .profile-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            -webkit-overflow-scrolling: touch;
        }

        .profile-avatar {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }
        .avatar-wrap {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 12px;
        }
        .avatar-wrap img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--primary);
            object-fit: cover;
        }
        .avatar-edit {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary);
            border: 2px solid var(--bg);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        #avatarFileInput { display: none; }

        /* Bio Box */
        .bio-display-box {
            background: linear-gradient(135deg, rgba(124,58,237,0.1), rgba(167,139,250,0.05));
            border: 1px solid rgba(124,58,237,0.3);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            position: relative;
            text-align: center;
            font-style: italic;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .bio-display-box::before {
            content: '"';
            position: absolute;
            top: -10px;
            left: 10px;
            font-size: 5rem;
            color: rgba(124,58,237,0.2);
            font-family: serif;
            transform: rotate(180deg);
            pointer-events: none;
        }
        .bio-display-box::after {
            content: '"';
            position: absolute;
            bottom: -30px;
            right: 10px;
            font-size: 5rem;
            color: rgba(124,58,237,0.2);
            font-family: serif;
            pointer-events: none;
        }
        .bio-text { 
            font-size: 1rem; 
            line-height: 1.6;
            color: var(--text);
            position: relative;
            z-index: 2;
        }
        .bio-empty { color: var(--text2); }

        /* Chat App */
        #chatApp {
            display: flex;
            height: 100vh;
            width: 100vw;
            background: var(--bg);
        }
        #chatApp.hidden { display: none; }

        /* Sidebar */
        .chat-sidebar {
            width: 70px;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0;
            gap: 8px;
            flex-shrink: 0;
        }

        .sidebar-logo {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .sidebar-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: none;
            background: transparent;
            color: var(--text2);
            font-size: 1.1rem;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 44px;
            min-height: 44px;
        }
        .sidebar-btn.active {
            background: rgba(124,58,237,0.15);
            color: var(--primary);
        }
        .sidebar-btn:active { background: rgba(255,255,255,0.1); }

        .sidebar-btn .tooltip {
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translateY(-50%);
            background: var(--bg3);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            white-space: nowrap;
            margin-left: 10px;
            border: 1px solid var(--border);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 100;
        }
        .sidebar-btn:hover .tooltip { opacity: 1; }

        .sidebar-spacer { flex: 1; }

        .sidebar-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            object-fit: cover;
            cursor: pointer;
        }

        /* Rooms Panel */
        .rooms-panel {
            width: 260px;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .rooms-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }
        .rooms-header h4 {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text2);
        }

        .room-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin: 4px 8px;
            border-radius: 12px;
            cursor: pointer;
            min-height: 60px;
        }
        .room-item:active { background: rgba(255,255,255,0.05); }
        .room-item.active {
            background: rgba(124,58,237,0.1);
            border: 1px solid rgba(124,58,237,0.2);
        }

        .room-badge {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .room-info {
            min-width: 0;
            flex: 1;
        }
        .room-info h5 { 
            font-size: 0.9rem; 
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .room-info span { 
            font-size: 0.7rem; 
            color: var(--text2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }

        .join-btn {
            background: rgba(124,58,237,0.15);
            border: 1px solid rgba(124,58,237,0.3);
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            flex-shrink: 0;
            min-width: 60px;
            text-align: center;
        }
        .joined-badge {
            background: var(--success);
            color: white;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
            flex-shrink: 0;
            min-width: 60px;
            text-align: center;
        }

        /* Chat Main */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            width: 100%;
        }

        .chat-topbar {
            padding: 12px 16px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .room-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(124,58,237,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .online-count {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(52,211,153,0.1);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: var(--success);
            flex-shrink: 0;
        }

        /* Messages Area */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .msg {
            display: flex;
            gap: 10px;
            max-width: 85%;
        }
        .msg.own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            align-self: flex-end;
            flex-shrink: 0;
        }

        .msg-body {
            min-width: 0;
            flex: 1;
        }

        .msg-bubble {
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            word-wrap: break-word;
            max-width: 100%;
        }
        .msg-bubble.other {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .msg-bubble.own {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            color: var(--text2);
            margin-bottom: 4px;
        }
        .msg.own .msg-meta { flex-direction: row-reverse; }

        /* Input Area */
        .chat-input-area {
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            background: var(--bg2);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .chat-input-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 6px 6px 6px 16px;
        }

        #msgInput {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 16px;
            outline: none;
            min-width: 0;
            padding: 8px 0;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .send-btn:active { transform: scale(0.95); }

        /* Members Panel */
        .members-panel {
            width: 220px;
            background: var(--bg2);
            border-left: 1px solid var(--border);
            padding: 16px;
            overflow-y: auto;
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }
        .members-panel h4 {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text2);
            margin-bottom: 16px;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 4px;
            min-height: 52px;
        }
        .member-item:active { background: rgba(255,255,255,0.05); }

        .member-item img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .member-info {
            flex: 1;
            min-width: 0;
        }
        .member-info div {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .member-info small {
            color: var(--text2);
            font-size: 0.7rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
        }

        /* Notice Form */
        .notice-form {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 380px;
            background: var(--bg3);
            border: 2px solid var(--primary);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            display: none;
            z-index: 1000;
        }
        .notice-form.show { display: block; }

        .notice-form-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        /* Notice Popup */
        #noticePopup {
            position: fixed;
            bottom: 20px;
            right: 20px;
            max-width: 300px;
            background: var(--bg3);
            border: 1px solid var(--primary);
            border-radius: 16px;
            padding: 16px;
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 1001;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        #noticePopup.show { transform: translateX(0); }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Empty State */
        .empty-msg {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text2);
            gap: 12px;
            text-align: center;
            padding: 20px;
        }
        .empty-msg i { font-size: 3rem; opacity: 0.3; }

        /* ==================== মোবাইল ফিক্স ==================== */
        @media (max-width: 768px) {
            /* হাইড panels */
            .rooms-panel { display: none; }
            .members-panel { display: none; }
            
            /* সাইডবার ছোট */
            .chat-sidebar { width: 60px; }
            .chat-main { width: calc(100vw - 60px); }
            
            /* বাটন সাইজ ঠিক */
            .sidebar-btn { 
                width: 44px; 
                height: 44px; 
            }
            
            /* মেসেজ সাইজ */
            .msg { max-width: 90%; }
            
            /* টপবার */
            .chat-topbar { padding: 10px 12px; }
            
            /* নোটিস ফর্ম */
            .notice-form {
                width: 90%;
                max-width: 340px;
                bottom: 70px;
            }
            
            /* নোটিস পপআপ */
            #noticePopup {
                left: 16px;
                right: 16px;
                max-width: none;
                bottom: 16px;
            }
            
            /* প্রোফাইল পেজ */
            .profile-content { padding: 16px; }
        }

        /* ছোট মোবাইল */
        @media (max-width: 480px) {
            .chat-sidebar { width: 50px; }
            .chat-main { width: calc(100vw - 50px); }
            
            .sidebar-logo { 
                width: 40px; 
                height: 40px; 
                font-size: 1rem; 
            }
            
            .sidebar-btn { 
                width: 40px; 
                height: 40px; 
                font-size: 1rem; 
            }
            
            .sidebar-avatar { 
                width: 36px; 
                height: 36px; 
            }
            
            .room-icon { 
                width: 36px; 
                height: 36px; 
                font-size: 1rem; 
            }
            
            .online-count { 
                padding: 4px 10px; 
                font-size: 0.7rem; 
            }
            
            .msg { max-width: 90%; }
            
            .msg-avatar { 
                width: 32px;

            <button class="sidebar-btn" onclick="switchRoom('dept')">

            <button class="sidebar-btn" onclick="switchRoom('batch')">
                <i class="fas fa-users"></i>

                </select>

                        <i class="fas fa-paper-plane"></i>

    <script>
        // ==================== STATE ====================
        let currentUser = null;
        let currentProfile = null;
        let currentRoom = 'global';
        let msgSubscription = null;
        let noticeSubscription = null;
        let allMessages = [];
        let joinedRooms = JSON.parse(localStorage.getItem('joinedRooms')) || [];

        const ROOMS = {
            global: { icon:'🌐', title:'Global Chat', placeholder:'Message Global Chat...' },
            dept: { icon:'🏛️', title:'Department Chat', placeholder:'Message Department...' },
            batch: { icon:'👥', title:'Batch Chat', placeholder:'Message Batch...' }
        };

        // ==================== ভিউপোর্ট ফিক্স ====================
        function setViewportHeight() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', vh + 'px');
        }

        window.addEventListener('resize', setViewportHeight);
        window.addEventListener('orientationchange', setViewportHeight);
        setViewportHeight();

        // ==================== UTILS ====================
        function showToast(msg, type='success') {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.className = `show ${type}`;
            setTimeout(() => toast.className = '', 3000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // ==================== THEME ====================
        function toggleTheme() {
            const html = document.documentElement;
            const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('themeIcon').className = newTheme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        }

        // ==================== AUTH ====================
        function switchTab(tab) {
            document.getElementById('signinForm').style.display = tab === 'signin' ? 'block' : 'none';
            document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }

        async function handleSignUp() {
            const name = document.getElementById('suName').value.trim();
            const studentId = document.getElementById('suStudentId').value.trim();
            const batch = document.getElementById('suBatch').value;
            const dept = document.getElementById('suDept').value;
            const semester = document.getElementById('suSemester').value;
            const password = document.getElementById('suPassword').value;

            if (!name || !studentId || !batch || !dept || !semester || !password) {
                return showToast('Please fill all fields!', 'error');
            }
            if (password.length < 6) {
                return showToast('Password must be at least 6 characters', 'error');
            }

            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Creating...';

            try {
                const fakeEmail = `${studentId.toLowerCase().replace(/[^a-z0-9]/g, '')}@campuscircle.vu`;

                const { data: authData, error: authError } = await _supabase.auth.signUp({
                    email: fakeEmail,
                    password: password,
                    options: { data: { name, student_id: studentId } }
                });

                if (authError) throw authError;

                const { error: profileError } = await _supabase.from('profiles').insert({
                    id: authData.user.id,
                    name: name,
                    student_id: studentId,
                    department: dept,
                    batch: batch,
                    semester: semester,
                    avatar_url: `https://api.dicebear.com/7.x/avataaars/svg?seed=${studentId}`,
                    created_at: new Date().toISOString()
                });

                if (profileError) throw profileError;

                showToast('Account created! Please sign in.', 'success');
                
                document.getElementById('siStudentId').value = studentId;
                document.getElementById('siPassword').value = password;
                switchTab('signin');

            } catch (error) {
                showToast(error.message, 'error');
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
        }

        async function handleSignIn() {
            const studentId = document.getElementById('siStudentId').value.trim();
            const password = document.getElementById('siPassword').value;

            if (!studentId || !password) {
                return showToast('Please enter Student ID and Password', 'error');
            }

            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Signing in...';

            try {
                const fakeEmail = `${studentId.toLowerCase().replace(/[^a-z0-9]/g, '')}@campuscircle.vu`;

                const { data, error } = await _supabase.auth.signInWithPassword({
                    email: fakeEmail,
                    password: password
                });

                if (error) throw error;

                currentUser = data.user;

                const { data: profile, error: profileError } = await _supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', currentUser.id)
                    .single();

                if (profileError) throw profileError;

                currentProfile = profile;
                
                document.getElementById('authPage').classList.add('hidden');
                document.getElementById('chatApp').classList.remove('hidden');
                
                switchRoom('global');
                loadOnlineMembers();
                subscribeNotices();
                
                showToast(`Welcome, ${currentProfile.name}!`);

            } catch (error) {
                showToast('Invalid Student ID or Password', 'error');
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
        }

        async function handleSignOut() {
            if (!confirm('Sign out?')) return;
            
            if (msgSubscription) msgSubscription.unsubscribe();
            if (noticeSubscription) noticeSubscription.unsubscribe();
            
            await _supabase.auth.signOut();
            
            currentUser = null;
            currentProfile = null;
            
            document.getElementById('chatApp').classList.add('hidden');
            document.getElementById('authPage').classList.remove('hidden');
            document.getElementById('profilePage').classList.add('hidden');
            
            showToast('Signed out');
        }

        // ==================== PROFILE ====================
        function openProfile() {
            document.getElementById('profilePage').classList.remove('hidden');
            updateProfileUI();
        }

        function closeProfile() {
            document.getElementById('profilePage').classList.add('hidden');
        }

        function updateProfileUI() {
            if (!currentProfile) return;
            
            const p = currentProfile;
            const avatarUrl = p.avatar_url || `https://api.dicebear.com/7.x/avataaars/svg?seed=${p.student_id}`;
            
            document.getElementById('sidebarAvatar').src = avatarUrl;
            document.getElementById('profileAvatarImg').src = avatarUrl;
            document.getElementById('profileNameDisplay').innerText = p.name;
            document.getElementById('profileDeptDisplay').innerText = `${p.department?.toUpperCase() || ''} • Batch ${p.batch || ''}`;
            document.getElementById('pStudentId').innerText = p.student_id;
            document.getElementById('pDept').innerText = p.department?.toUpperCase() || '';
            document.getElementById('pBatch').innerText = p.batch || '';
            document.getElementById('pSemester').innerText = p.semester || '';
            
            const bioDisplay = document.getElementById('profileBioDisplay');
            if (p.bio) {
                bioDisplay.className = 'bio-text';
                bioDisplay.innerHTML = `<i class="fas fa-quote-left" style="opacity:0.5;"></i> ${escapeHtml(p.bio)} <i class="fas fa-quote-right" style="opacity:0.5;"></i>`;
                document.getElementById('bioInput').value = p.bio;
            } else {
                bioDisplay.className = 'bio-empty';
                bioDisplay.innerHTML = '<i class="fas fa-quote-left"></i> No bio yet';
            }
            
            document.getElementById('deptRoomLabel').innerText = p.department?.toUpperCase() || 'Department';
            document.getElementById('batchRoomLabel').innerText = `Batch ${p.batch || ''}`;
            
            updateBioCounter();
        }

        function updateBioCounter() {
            const val = document.getElementById('bioInput').value.length;
            document.getElementById('bioCounter').innerText = `${val}/110`;
        }

        async function saveBio() {
            const bio = document.getElementById('bioInput').value.trim();
            if (bio.length > 110) return showToast('Bio max 110 characters', 'error');
            
            const { error } = await _supabase
                .from('profiles')
                .update({ bio })
                .eq('id', currentUser.id);
                
            if (error) return showToast(error.message, 'error');
            
            currentProfile.bio = bio;
            updateProfileUI();
            showToast('Bio saved!');
        }

        async function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) return showToast('Image must be under 2MB', 'error');
            
            showToast('Uploading...');
            
            const ext = file.name.split('.').pop();
            const fileName = `${currentUser.id}.${ext}`;
            
            const { error: uploadError } = await _supabase.storage
                .from('avatars')
                .upload(fileName, file, { upsert: true });
                
            if (uploadError) return showToast(uploadError.message, 'error');
            
            const { data: urlData } = _supabase.storage.from('avatars').getPublicUrl(fileName);
            const avatarUrl = urlData.publicUrl + '?t=' + Date.now();
            
            await _supabase.from('profiles').update({ avatar_url: avatarUrl }).eq('id', currentUser.id);
            
            currentProfile.avatar_url = avatarUrl;
            updateProfileUI();
            showToast('Photo updated!');
        }

        // ==================== JOIN SYSTEM ====================
        function joinRoom(room, e) {
            e.stopPropagation();
            
            if (room === 'global') {
                joinedRooms.push('global');
                updateJoinUI('global', true);
                showToast('Joined Global Chat!');
            } else if (room === 'dept') {
                if (!currentProfile?.department) return showToast('Complete your profile first', 'error');
                joinedRooms.push('dept');
                updateJoinUI('dept', true);
                showToast(`Joined ${currentProfile.department.toUpperCase()} Department!`);
            } else if (room === 'batch') {
                if (!currentProfile?.batch) return showToast('Complete your profile first', 'error');
                joinedRooms.push('batch');
                updateJoinUI('batch', true);
                showToast(`Joined Batch ${currentProfile.batch}!`);
            }
            
            localStorage.setItem('joinedRooms', JSON.stringify(joinedRooms));
        }

        function updateJoinUI(room, joined) {
            const joinBtn = document.getElementById(`join-${room}`);
            const joinedBadge = document.getElementById(`joined-${room}`);
            if (joinBtn && joinedBadge) {
                joinBtn.style.display = joined ? 'none' : 'block';
                joinedBadge.style.display = joined ? 'block' : 'none';
            }
        }

        function checkJoinAndSwitch(room) {
            if (joinedRooms.includes(room)) {
                switchRoom(room);
            } else {
                showToast(`Please join ${room} room first`, 'error');
            }
        }

        // ==================== NOTICE ====================
        function toggleNoticeForm() {
            document.getElementById('noticeForm').classList.toggle('show');
        }

        async function sendNotice(e) {
            e.preventDefault();
            
            const dept = document.getElementById('noticeDept').value;
            const batch = document.getElementById('noticeBatch').value;
            const message = document.getElementById('noticeMessage').value.trim();
            
            if (!message) return showToast('Write a message', 'error');
            
            const btn = e.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Sending...';
            
            const notice = {
                user_id: currentUser.id,
                sender_name: currentProfile.name,
                sender_dept: currentProfile.department,
                target_dept: dept,
                target_batch: batch,
                message: message,
                created_at: new Date().toISOString()
            };
            
            const { error } = await _supabase.from('notices').insert(notice);
            
            if (error) {
                showToast(error.message, 'error');
            } else {
                showToast('Notice sent!');
                document.getElementById('noticeMessage').value = '';
                toggleNoticeForm();
            }
            
            btn.disabled = false;
            btn.innerHTML = 'Send Notice';
        }

        function subscribeNotices() {
            noticeSubscription = _supabase
                .channel('notices')
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'notices'
                }, (payload) => {
                    const notice = payload.new;
                    const deptMatch = notice.target_dept === 'all' || notice.target_dept === currentProfile?.department;
                    const batchMatch = notice.target_batch === 'all' || notice.target_batch === currentProfile?.batch;
                    
                    if (deptMatch && batchMatch && notice.user_id !== currentUser?.id) {
                        showNoticePopup(notice);
                    }
                })
                .subscribe();
        }

        function showNoticePopup(notice) {
            const popup = document.getElementById('noticePopup');
            document.getElementById('noticePopupContent').innerHTML = 
                `<strong>${notice.sender_name}</strong>: ${notice.message}`;
            popup.classList.add('show');
            setTimeout(() => popup.classList.remove('show'), 5000);
        }

        function closeNoticePopup() {
            document.getElementById('noticePopup').classList.remove('show');
        }

        // ==================== CHAT ROOMS ====================
        function getRoomName(room) {
            if (room === 'dept') return `${currentProfile?.department?.toUpperCase() || 'Department'} Chat`;
            if (room === 'batch') return `Batch ${currentProfile?.batch || ''} Chat`;
            return ROOMS[room]?.title || room;
        }

        function getRoomChannel(room) {
            if (room === 'dept') return `dept_${currentProfile?.department || 'general'}`;
            if (room === 'batch') return `batch_${currentProfile?.batch || 'general'}`;
            return room;
        }

        function switchRoom(room) {
            if (!joinedRooms.includes(room) && room !== 'global') {
                showToast(`Please join ${room} room first`, 'error');
                return;
            }
            
            currentRoom = room;
            allMessages = [];
            
            document.querySelectorAll('.sidebar-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.room-item').forEach(item => item.classList.remove('active'));
            
            document.getElementById(`btn${room.charAt(0).toUpperCase()+room.slice(1)}`)?.classList.add('active');
            document.getElementById(`room-${room}`)?.classList.add('active');
            
            document.getElementById('roomIcon').innerText = ROOMS[room]?.icon || '🌐';
            document.getElementById('roomTitle').innerText = getRoomName(room);
            document.getElementById('msgInput').placeholder = ROOMS[room]?.placeholder || 'Type a message...';
            
            if (msgSubscription) msgSubscription.unsubscribe();
            
            loadMessages();
            subscribeMessages();
        }

        async function loadMessages() {
            const channel = getRoomChannel(currentRoom);
            const { data } = await _supabase
                .from('messages')
                .select('*, profiles(name, avatar_url)')
                .eq('room', channel)
                .order('created_at', { ascending: true })
                .limit(50);
                
            allMessages = data || [];
            renderMessages();
        }

        function renderMessages() {
            const container = document.getElementById('chatMessages');
            
            if (!allMessages.length) {
                container.innerHTML = '<div class="empty-msg"><i class="fas fa-comments"></i><p>No messages yet. Say something! 👋</p></div>';
                return;
            }
            
            container.innerHTML = '';
            let lastDate = '';
            
            allMessages.forEach(msg => {
                const msgDate = new Date(msg.created_at).toLocaleDateString();
                
                if (msgDate !== lastDate) {
                    const sep = document.createElement('div');
                    sep.className = 'date-sep';
                    sep.innerHTML = `<span>${msgDate}</span>`;
                    container.appendChild(sep);
                    lastDate = msgDate;
                }
                
                container.appendChild(createMessageElement(msg));
            });
            
            scrollToBottom();
        }

        function createMessageElement(msg) {
            const isOwn = msg.user_id === currentUser?.id;
            const profile = msg.profiles;
            const name = profile?.name || 'Student';
            const avatar = profile?.avatar_url || `https://api.dicebear.com/7.x/avataaars/svg?seed=${msg.user_id}`;
            const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const div = document.createElement('div');
            div.className = `msg ${isOwn ? 'own' : ''}`;
            div.innerHTML = `
                <img class="msg-avatar" src="${avatar}" alt="${name}">
                <div class="msg-body">
                    <div class="msg-meta">
                        <span class="msg-name">${isOwn ? 'You' : name}</span>
                        <span>${time}</span>
                    </div>
                    <div class="msg-bubble ${isOwn ? 'own' : 'other'}">${escapeHtml(msg.content)}</div>
                </div>
            `;
            return div;
        }

        function scrollToBottom() {
            setTimeout(() => {
                const container = document.getElementById('chatMessages');
                container.scrollTop = container.scrollHeight;
            }, 100);
        }

        // ==================== REAL-TIME SUBSCRIPTION ====================
        function subscribeMessages() {
            const channel = getRoomChannel(currentRoom);
            
            if (msgSubscription) {
                msgSubscription.unsubscribe();
            }
            
            msgSubscription = _supabase
                .channel(`room-${channel}`)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages',
                    filter: `room=eq.${channel}`
                }, async (payload) => {
                    const { data } = await _supabase
                        .from('messages')
                        .select('*, profiles(name, avatar_url)')
                        .eq('id', payload.new.id)
                        .single();
                        
                    if (data) {
                        const emptyMsg = document.querySelector('.empty-msg');
                        if (emptyMsg) emptyMsg.remove();
                        
                        allMessages.push(data);
                        document.getElementById('chatMessages').appendChild(createMessageElement(data));
                        scrollToBottom();
                    }
                })
                .subscribe();
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const content = input.value.trim();
            
            if (!content) return showToast('Type a message', 'error');
            if (!currentUser) return showToast('Please login first', 'error');
            if (!joinedRooms.includes(currentRoom) && currentRoom !== 'global') {
                return showToast('Please join the room first', 'error');
            }
            
            input.disabled = true;
            
            const channel = getRoomChannel(currentRoom);
            const { error } = await _supabase.from('messages').insert({
                user_id: currentUser.id,
                room: channel,
                content: content
            });
            
            input.disabled = false;
            
            if (error) {
                showToast(error.message, 'error');
            } else {
                input.value = '';
            }
        }

        function handleMsgKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // ==================== ONLINE MEMBERS ====================
        async function loadOnlineMembers() {
            const { data } = await _supabase
                .from('profiles')
                .select('id, name, avatar_url, department, batch')
                .limit(30);
                
            const list = document.getElementById('membersList');
            list.innerHTML = (data || []).map(m => `
                <div class="member-item">
                    <img src="${m.avatar_url || `https://api.dicebear.com/7.x/avataaars/svg?seed=${m.id}`}">
                    <div class="member-info">
                        <div>${m.name}</div>
                        <small>${m.department?.toUpperCase() || ''} • ${m.batch || ''}</small>
                    </div>
                    <div class="online-dot"></div>
                </div>
            `).join('');
            
            document.getElementById('onlineCountText').innerText = data?.length || 0;
        }

        // ==================== INIT ====================
        async function init() {
            loadTheme();
            
            const { data: { session } } = await _supabase.auth.getSession();
            
            if (session?.user) {
                currentUser = session.user;
                
                const { data: profile } = await _supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', currentUser.id)
                    .single();
                    
                if (profile) {
                    currentProfile = profile;
                    document.getElementById('authPage').classList.add('hidden');
                    document.getElementById('chatApp').classList.remove('hidden');
                    
                    switchRoom('global');
                    loadOnlineMembers();
                    subscribeNotices();
                    
                    showToast(`Welcome, ${profile.name}!`);
                }
            }
        }

        init();
    </script>
</body>
</html>
