<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Circle - RealTime Chat Platform</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* Same CSS as before - keep it exactly as previous */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        .auth-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .auth-header i {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .auth-header h2 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .auth-body {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            width: 100%;
            font-family: 'Poppins', sans-serif;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
        }

        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        /* Main App Layout */
        .app-container {
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            height: 100vh;
            background: #f5f5f5;
        }

        .sidebar {
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            padding: 20px;
            overflow-y: auto;
        }

        .profile-card {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #f0f0f0;
            margin-bottom: 20px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            font-weight: 600;
        }

        .profile-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .profile-bio {
            font-size: 12px;
            color: #666;
            margin: 10px 0;
        }

        .nav-item {
            padding: 12px 15px;
            margin: 5px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item:hover,
        .nav-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .chat-area {
            display: flex;
            flex-direction: column;
            background: white;
            margin: 20px;
            border-radius: 20px;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 70%;
        }

        .message.own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-content {
            background: #f0f2f5;
            padding: 10px 15px;
            border-radius: 18px;
        }

        .message.own .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .chat-input {
            padding: 20px;
            background: #f8f9fa;
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
        }

        .chat-input button {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
        }

        .notifications-panel {
            background: white;
            margin: 20px 20px 20px 0;
            border-radius: 20px;
            padding: 20px;
            overflow-y: auto;
        }

        .notification-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <script>
        // সুপাবেস কনফিগারেশন - তোমার ক্রেডেনশিয়ালস দাও
        const SUPABASE_URL = 'https://htozsbirvogyrbuosujg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_jzs5NdZBc1tzbzf70kXyHg_RlSgdSpt';
        
        // সুপাবেস ক্লায়েন্ট ইনিশিয়ালাইজ
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // গ্লোবাল ভেরিয়েবল
        let currentUser = null;

        // ফর্ম টগল ফাংশন
        window.showSignup = function() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
        };

        window.showLogin = function() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('signupForm').style.display = 'none';
        };

        // সাইনআপ ফাংশন - ডিবাগ করা ভার্সন
        window.handleSignup = async function() {
            try {
                // ফর্ম থেকে ভ্যালু নেওয়া
                const name = document.getElementById('signupName').value;
                const studentId = document.getElementById('signupStudentId').value;
                const email = document.getElementById('signupEmail').value;
                const semester = document.getElementById('signupSemester').value;
                const department = document.getElementById('signupDepartment').value;
                const batch = document.getElementById('signupBatch').value;
                const password = document.getElementById('signupPassword').value;
                const confirmPass = document.getElementById('signupConfirmPassword').value;

                // ভ্যালিডেশন
                if(!name || !studentId || !email || !semester || !department || !batch || !password) {
                    alert('সব ঘর পূরণ করুন');
                    return;
                }

                if(password !== confirmPass) {
                    alert('পাসওয়ার্ড মিলছে না');
                    return;
                }

                if(password.length < 6) {
                    alert('পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে');
                    return;
                }

                console.log('Signup attempt with:', { name, studentId, email, semester, department, batch });

                // ডাইরেক্ট ইনসার্ট - RLS বাইপাস করে
                const { data, error } = await supabase
                    .from('users')
                    .insert([
                        {
                            name: name,
                            student_id: studentId,
                            email: email,
                            semester: parseInt(semester),
                            department: department,
                            batch: batch,
                            password_hash: btoa(password),
                            bio: '',
                            created_at: new Date().toISOString()
                        }
                    ])
                    .select();

                if(error) {
                    console.error('Supabase error:', error);
                    alert('এরর: ' + error.message);
                    return;
                }

                console.log('Success:', data);
                alert('অ্যাকাউন্ট তৈরি হয়েছে! এখন লগইন করুন');
                
                // ফর্ম ক্লিয়ার
                document.getElementById('signupName').value = '';
                document.getElementById('signupStudentId').value = '';
                document.getElementById('signupEmail').value = '';
                document.getElementById('signupPassword').value = '';
                document.getElementById('signupConfirmPassword').value = '';
                
                // লগইন ফর্ম দেখাও
                showLogin();
                
            } catch(error) {
                console.error('ক্যাচ এরর:', error);
                alert('এরর: ' + error.message);
            }
        };

        // লগইন ফাংশন
        window.handleLogin = async function() {
            try {
                const studentId = document.getElementById('loginStudentId').value;
                const password = document.getElementById('loginPassword').value;

                if(!studentId || !password) {
                    alert('আইডি এবং পাসওয়ার্ড দিন');
                    return;
                }

                console.log('Login attempt with:', studentId);

                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('student_id', studentId)
                    .eq('password_hash', btoa(password));

                if(error) {
                    console.error('Login error:', error);
                    alert('লগইন এরর: ' + error.message);
                    return;
                }

                if(!data || data.length === 0) {
                    alert('ভুল আইডি বা পাসওয়ার্ড');
                    return;
                }

                currentUser = data[0];
                console.log('Logged in:', currentUser);

                // হোম পেজ দেখাও
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                
                // প্রোফাইল লোড কর
                loadUserProfile();
                loadMessages();
                
            } catch(error) {
                console.error('Login catch error:', error);
                alert('লগইন এরর: ' + error.message);
            }
        };

        // প্রোফাইল লোড
        function loadUserProfile() {
            if(!currentUser) return;

            document.getElementById('profileName').textContent = currentUser.name;
            document.getElementById('profileBio').textContent = currentUser.bio || 'কিছু লিখুন...';
            document.getElementById('avatarText').textContent = currentUser.name.charAt(0).toUpperCase();
            
            const details = `
                <p><i class="fas fa-id-card"></i> ${currentUser.student_id}</p>
                <p><i class="fas fa-envelope"></i> ${currentUser.email}</p>
                <p><i class="fas fa-layer-group"></i> Semester ${currentUser.semester}</p>
                <p><i class="fas fa-building"></i> ${currentUser.department}</p>
                <p><i class="fas fa-calendar-alt"></i> Batch ${currentUser.batch}</p>
            `;
            
            document.getElementById('profileDetails').innerHTML = details;
        }

        // মেসেজ লোড
        async function loadMessages() {
            try {
                const { data, error } = await supabase
                    .from('messages')
                    .select('*, users!inner(name, batch, department)')
                    .order('created_at', { ascending: true });

                if(error) {
                    console.error('Message load error:', error);
                    return;
                }

                displayMessages(data || []);
            } catch(error) {
                console.error('Error:', error);
            }
        }

        // মেসেজ দেখানো
        function displayMessages(messages) {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';

            messages.forEach(msg => {
                const isOwn = msg.user_id === currentUser?.id;
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${isOwn ? 'own' : ''}`;

                const time = new Date(msg.created_at).toLocaleTimeString();
                const senderName = msg.users?.name || 'Unknown';
                const senderBatch = msg.users?.batch || '';

                messageDiv.innerHTML = `
                    <div class="message-content">
                        ${!isOwn ? `<small>${senderName} (Batch ${senderBatch})</small><br>` : ''}
                        <span>${msg.content}</span>
                        <br><small>${time}</small>
                    </div>
                `;

                container.appendChild(messageDiv);
            });

            container.scrollTop = container.scrollHeight;
        }

        // মেসেজ পাঠানো
        window.sendMessage = async function() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if(!content || !currentUser) return;

            try {
                const { error } = await supabase
                    .from('messages')
                    .insert([
                        {
                            user_id: currentUser.id,
                            content: content,
                            created_at: new Date().toISOString()
                        }
                    ]);

                if(error) {
                    console.error('Send error:', error);
                    alert('মেসেজ পাঠানো যায়নি');
                    return;
                }

                input.value = '';
                loadMessages(); // রিলোড মেসেজ
                
            } catch(error) {
                console.error('Error:', error);
            }
        };

        // রিয়েল-টাইম সাবস্ক্রিপশন
        function subscribeToMessages() {
            supabase
                .channel('messages-channel')
                .on('postgres_changes', 
                    { event: 'INSERT', schema: 'public', table: 'messages' },
                    (payload) => {
                        loadMessages(); // নতুন মেসেজ এলে রিলোড
                    }
                )
                .subscribe();
        }

        // লগআউট
        window.logout = function() {
            currentUser = null;
            document.getElementById('authSection').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
            
            document.getElementById('loginStudentId').value = '';
            document.getElementById('loginPassword').value = '';
        };

        // নোটিফিকেশন ফাংশন (সিম্পল ভার্সন)
        window.switchTab = function(tab) {
            if(tab === 'chat') {
                document.getElementById('chatArea').style.display = 'flex';
                document.getElementById('notificationsPanel').style.display = 'none';
            } else {
                document.getElementById('chatArea').style.display = 'none';
                document.getElementById('notificationsPanel').style.display = 'block';
                loadNotifications();
            }
        };

        // নোটিফিকেশন লোড
        async function loadNotifications() {
            try {
                const { data, error } = await supabase
                    .from('notifications')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(20);

                if(error) throw error;

                const container = document.getElementById('notificationsContainer');
                container.innerHTML = '';

                data.forEach(notif => {
                    const div = document.createElement('div');
                    div.className = 'notification-card';
                    div.innerHTML = `
                        <h4>${notif.title}</h4>
                        <p>${notif.content}</p>
                        <small>${new Date(notif.created_at).toLocaleString()}</small>
                    `;
                    container.appendChild(div);
                });
            } catch(error) {
                console.error('Notification error:', error);
            }
        }

        // পেইজ লোড হলে
        window.onload = function() {
            console.log('App loaded');
            // এন্টার কি তে মেসেজ পাঠানো
            document.getElementById('messageInput')?.addEventListener('keypress', function(e) {
                if(e.key === 'Enter') sendMessage();
            });
        };
    </script>

    <!-- Auth Section -->

        <!-- Login Form -->
        <div id="loginForm" class="auth-card">
            <div class="auth-header">
                <i class="fas fa-graduation-cap"></i>
                <h2>ক্যাম্পাস সার্কেলে স্বাগতম</h2>

            </div>

    <!-- Main App Section -->
    <div id="mainApp" style="display: none;">
        <div class="app-container">
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="profile-card">
                    <div class="avatar" id="profileAvatar">
                        <span id="avatarText"></span>
                    </div>
                    <div class="profile-name" id="profileName"></div>
                    <div class="profile-bio" id="profileBio"></div>
                    <div class="profile-details" id="profileDetails"></div>
                </div>

                <div class="nav-item active" onclick="switchTab('chat')">
                    <i class="fas fa-comments"></i> গ্লোবাল চ্যাট
                </div>
                <div class="nav-item" onclick="switchTab('notifications')">
                    <i class="fas fa-bell"></i> নোটিফিকেশন
                </div>
                <div class="nav-item" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> লগআউট
                </div>
            </div>

            <!-- Chat Area -->
            <div class="chat-area" id="chatArea">
                <div class="chat-header" style="padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                    <h3><i class="fas fa-globe"></i> গ্লোবাল চ্যাট</h3>
                    <p>সবাই মিলে কথা বলুন</p>
                </div>
                <div class="messages" id="messagesContainer"></div>
                <div class="chat-input">
                    <input type="text" id="messageInput" placeholder="মেসেজ লিখুন...">
                    <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>

            <!-- Notifications Panel -->
            <div class="notifications-panel" id="notificationsPanel" style="display: none;">
                <div class="panel-header">
                    <h3><i class="fas fa-bullhorn"></i> নোটিফিকেশন</h3>
                </div>
                <div id="notificationsContainer"></div>
            </div>
        </div>
    </div>

    <script>
        // শুরুতে অথ সেকশন দেখাও
        document.getElementById('authSection').style.display = 'flex';
    </script>
</body>
</html>
